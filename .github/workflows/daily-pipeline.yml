name: Daily Quant Pipeline

on:
  schedule:
    - cron: "0 1 * * *"  # 01:00 UTC = 08:00 WIB daily
  workflow_dispatch:  # Manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Allow push back

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python -m src.main

      - name: Commit & Push updates
        run: |
          git config user.name "alpha-radar[bot]"
          git config user.email "bot@alpha-radar.dev"
          git add README.md data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: daily pipeline run $(date '+%Y-%m-%d')"
          git push